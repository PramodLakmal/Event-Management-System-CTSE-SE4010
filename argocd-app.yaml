apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: event-sync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/PramodLakmal/Event-Management-System-CTSE-SE4010.git'
    targetRevision: HEAD
    path: '.'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
