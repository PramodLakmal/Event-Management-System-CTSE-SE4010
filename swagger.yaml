openapi: 3.0.0
info:
  title: EventSync Microservices API
  description: API documentation for the Distributed Event Management System (User, Event, Registration, and Notification services).
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: API Gateway
  - url: http://98.81.163.213:3000
    description: Production API Gateway

paths:
  /api/users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered successfully

  /api/users/login:
    post:
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: JWT Bearer Token returned
          
  /api/events:
    get:
      summary: Retrieve all upcoming events
      responses:
        '200':
          description: Array of events
    post:
      summary: Create a new event (ADMIN only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                date:
                  type: string
                location:
                  type: string
                capacity:
                  type: integer
      responses:
        '201':
          description: Event created

  /api/registrations:
    post:
      summary: Register for an event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  type: string
      responses:
        '201':
          description: Successfully registered
          
  /api/notifications:
    get:
      summary: Get all notifications for logged in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of notifications

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
