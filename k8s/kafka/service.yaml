apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
  labels:
    app: kafka
    component: message-broker
spec:
  type: ClusterIP
  publishNotReadyAddresses: true
  ports:
  - port: 9092
    targetPort: 9092
    name: client
  - port: 29092
    targetPort: 29092
    name: internal
  selector:
    app: kafka
