apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
    component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: microservice
    spec:
      containers:
      - name: notification-service
        image: sliitprojectmail/event-sync-notification-service:a4d22db8dd219976b44eaa520cdb51d3952fa1d1
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: MONGO_URI_NOTIFICATION
        - name: KAFKA_BROKER
          value: "kafka-svc:9092"
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: SMTP_PORT
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: SMTP_PASS
        - name: EMAIL_FROM
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: EMAIL_FROM
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 20
          periodSeconds: 30
