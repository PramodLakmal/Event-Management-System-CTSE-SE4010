version: '3.8'

services:
  # Kafka (KRaft mode - no Zookeeper required)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_PRIVATE_IP:-localhost}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - event-net

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/event-sync-api-gateway:latest
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - EVENT_SERVICE_URL=${EVENT_SERVICE_URL}
      - REGISTRATION_SERVICE_URL=${REGISTRATION_SERVICE_URL}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - event-net

  # Microservice 1: User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/event-sync-user-service:latest
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=${MONGO_URI_USER}
      - JWT_SECRET=${JWT_SECRET}
      - KAFKA_BROKER=${KAFKA_BROKER_IP:-kafka:29092}
    networks:
      - event-net

  # Microservice 2: Event Service
  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/event-sync-event-service:latest
    container_name: event-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=${MONGO_URI_EVENT}
      - KAFKA_BROKER=${KAFKA_BROKER_IP:-kafka:29092}
    networks:
      - event-net

  # Microservice 3: Registration Service
  registration-service:
    build:
      context: ./services/registration-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/event-sync-registration-service:latest
    container_name: registration-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=${MONGO_URI_REGISTRATION}
      - KAFKA_BROKER=${KAFKA_BROKER_IP:-kafka:29092}
      - USER_SERVICE_URL=http://user-service:3001
      - EVENT_SERVICE_URL=http://event-service:3002
    networks:
      - event-net

  # Microservice 4: Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/event-sync-notification-service:latest
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGO_URI=${MONGO_URI_NOTIFICATION}
      - KAFKA_BROKER=${KAFKA_BROKER_IP:-kafka:29092}
    networks:
      - event-net

  # Frontend (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-local}/event-sync-frontend-ui:latest
    container_name: frontend-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_GATEWAY_URL=${VITE_API_GATEWAY_URL:-http://localhost:3000}
    networks:
      - event-net

networks:
  event-net:
    driver: bridge
