name: EventSync CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
    paths-ignore:
      - 'k8s/**'      # Prevents infinite loop when ArgoCD bot commits updated image tags
      - 'argocd/**'   # ArgoCD config changes don't need a rebuild

jobs:
  security-scan:
    name: SAST Security Scan (Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects

  build-and-push:
    name: Build & Push Docker Images
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag images with Git SHA
        run: |
          sed -i "s/:latest/:${{ github.sha }}/g" docker-compose.yml

      - name: Build and push all images
        run: docker compose -f docker-compose.yml build && docker compose -f docker-compose.yml push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Update k8s manifests with new image tag (GitOps write-back)
        run: |
          SHA=${{ github.sha }}
          # Replace any existing tag on sliitprojectmail images (works on :latest AND previous SHAs)
          find k8s -name "deployment.yaml" | xargs sed -i -E "s|(sliitprojectmail/[^:]+):[^[:space:]]+|\1:$SHA|g"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          # Only commit if there are actual staged changes
          git diff --cached --quiet || git commit -m "chore: update image tags to $SHA [skip ci]"
          git push
