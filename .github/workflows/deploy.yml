name: Distributed EventSync CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
    paths-ignore:
      - 'k8s-manifest.yaml' # Prevents infinite GitHub Action deployment loops!

jobs:
  sast-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects

  build-and-push-gitops:
    needs: sast-security
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants GitHub Actions authorization to commit back to the repo
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Dynamically Inject Git Commit SHA
        run: |
          # The absolute Enterprise standard! Replaces ':latest' with the exact Git SHA!
          sed -i "s/:latest/:${{ github.sha }}/g" docker-compose.yml
          sed -i "s/:latest/:${{ github.sha }}/g" k8s-manifest.yaml
          
      - name: Build and Push Images
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: GitOps Declarative Commit
        run: |
          git config --global user.name "GitHub Actions ArgoCD Bot"
          git config --global user.email "actions@github.com"
          git add k8s-manifest.yaml
          git commit -m "chore: auto-update Kubernetes manifests to SHA ${{ github.sha }} for ArgoCD GitOps"
          git push
