  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: docker.io/sliitprojectmail/event-sync-notification-service:cac15b36f45dab8acb84a06bb238e751c88cf964
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
