# Kafka
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: docker.io/confluentinc/cp-kafka:7.5.0
        ports:
        - containerPort: 9092
        env:
        - name: CLUSTER_ID
          value: 'MkU3OEVBNTcwNTJENDM2Qk'
        - name: KAFKA_NODE_ID
          value: '1'
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
        - name: KAFKA_LISTENERS
          value: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
        - name: KAFKA_ADVERTISED_LISTENERS
          value: 'PLAINTEXT://kafka-svc:29092,PLAINTEXT_HOST://kafka-svc:9092'
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: 'CONTROLLER'
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: '1@127.0.0.1:29093'
        - name: KAFKA_PROCESS_ROLES
          value: 'broker,controller'
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: '1'
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: '0'
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
spec:
  type: ClusterIP
  publishNotReadyAddresses: true
  ports:
  - port: 9092
    targetPort: 9092
    name: client
  - port: 29092
    targetPort: 29092
    name: internal
  selector:
    app: kafka
---
# User Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: docker.io/sliitprojectmail/event-sync-user-service:cac15b36f45dab8acb84a06bb238e751c88cf964
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: MONGO_URI_USER
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: user-service
---
# Event Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
      - name: event-service
        image: docker.io/sliitprojectmail/event-sync-event-service:cac15b36f45dab8acb84a06bb238e751c88cf964
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: MONGO_URI_EVENT
        - name: KAFKA_BROKER
          value: "kafka-svc:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
  selector:
    app: event-service
---
# Registration Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
      - name: registration-service
        image: docker.io/sliitprojectmail/event-sync-registration-service:cac15b36f45dab8acb84a06bb238e751c88cf964
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: MONGO_URI_REGISTRATION
        - name: USER_SERVICE_URL
          value: "http://user-service:3001"
        - name: EVENT_SERVICE_URL
          value: "http://event-service:3002"
        - name: KAFKA_BROKER
          value: "kafka-svc:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
spec:
  type: ClusterIP
  ports:
  - port: 3003
    targetPort: 3003
  selector:
    app: registration-service
---
# Notification Service
apiVersion: apps/v1
