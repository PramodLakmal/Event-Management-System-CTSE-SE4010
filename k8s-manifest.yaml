---
# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: docker.io/sliitprojectmail/event-sync-api-gateway:cac15b36f45dab8acb84a06bb238e751c88cf964
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: USER_SERVICE_URL
          value: "http://user-service:3001"
        - name: EVENT_SERVICE_URL
          value: "http://event-service:3002"
        - name: REGISTRATION_SERVICE_URL
          value: "http://registration-service:3003"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:3004"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: event-sync-secrets
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: api-gateway
---
# Frontend UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-ui
  template:
    metadata:
      labels:
        app: frontend-ui
    spec:
      containers:
      - name: frontend-ui
        image: docker.io/sliitprojectmail/event-sync-frontend-ui:cac15b36f45dab8acb84a06bb238e751c88cf964
        imagePullPolicy: Always
        ports:
        - containerPort: 5173
        env:
        - name: VITE_API_GATEWAY_URL
          value: "/api"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-ui
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5173
  selector:
    app: frontend-ui
---
# Nginx Ingress Route
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-sync-ingress-api
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api(/api)?/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-sync-ingress-ui
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-ui
            port:
              number: 80
